<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design de Website Animado</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- divisão principal da página, contendo a navegação, o conteúdo e a imagem de destaque -->
    <div class="hero">
        <!-- barra de navegação -->
        <nav>
            <!-- imagem do logo da empresa, posicionada à esquerda da barra de navegação -->
            <img src="img/logo.png" alt="Logo da empresa" class="logo">

            <!-- botões de navegação, posicionados à esquerda da barra de navegação -->
            <ul>
                <li><a href="#sobre">Sobre</a></li>
                <li><a href="#servicos">Serviços</a></li>
                <li><a href="#contato">Contato</a></li>
            </ul>
        
            <!-- botões de login e cadastro, posicionados à direita da barra de navegação -->
            <div>
                <a href="#login" class="login-btn">Login</a>
                <a href="#cadastro" class="cadastro-btn">Cadastro</a>
            </div>
        </nav>

        <!-- conteúdo principal, contendo o título, o parágrafo e o botão de cadastro, além da imagem de destaque -->
        <div class="content">
            <h1 class="anim">Bem-vindo <br>à Nossa Empresa</h1>
            <p class="anim">Somos uma empresa dedicada a fornecer os melhores serviços do mercado.</p>
            <a href="#saibamais" class="cadastro-btn anim">Saiba Mais</a>
        </div>
        <img src="img/pic.png" alt="Imagem da empresa" class="feature-img anim">



    </div>
    <a href="javascript:history.back()" class="back-btn">← Voltar</a>
</body>
</html>
