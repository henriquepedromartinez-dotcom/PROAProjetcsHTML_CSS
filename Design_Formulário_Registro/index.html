<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Registro</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <form action="#" method="post">
        <div class="user-img">
            <img src="img/user.png" alt="Ícone de usuário" id="user">
        </div>
        
        <h1>Registro de Usuário</h1>
      
       
        <div class="input-box">
            <span><img src="img/nome.png" alt="Ícone de usuário" class="user"></span>
            <input type="text" name="username" placeholder="Nome de usuário" required>
        </div>
        <div class="input-box">
            <span><img src="img/email.png" alt="Ícone de email" class="email"></span>
            <input type="email" name="email" placeholder="Email" required>
        </div>
        <div class="input-box">
            <span><img src="img/senha.png" alt="Ícone de senha" class="password"></span>
            <input type="password" name="password" placeholder="Senha" required>
        </div>
        <button type="submit">Registrar</button>
    </form>
    <a href="javascript:history.back()" class="back-btn">← Voltar</a>
</body>
</html>
