<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Login Page</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <nav><a href="#">
        <img src="images/logo.svg" alt=""></a>
    </nav>
    <div class="form-wrapper">
        <h2>Entrar</h2>
        <form action="#">
            <div class="form-control">
                <input type="text" required>
                <label>Email ou Telefone</label>
            </div>
            <div class="form-control">
                <input type="password" required>
                <label for="">Senha</label>
            </div>
            <button type="submit">Entrar</button>
            <div class="form-help">
                <div class="remember-me">
                    <input type="checkbox" name="" id="remember-me">
                    <label for="remember-me">Lembre da Senha</label>
                    <a href="#">Precisa de Ajuda?</a>
                </div>
            </div>
        </form>
        <p>Novo por aqui? <a href="#">Cadastre-se</a></p>
        <small>
            Esta página é protegida por reCAPTCHA para sua segurança
            <a href="">Saiba Mais</a>
        </small>
    </div>
    <a href="javascript:history.back()" class="back-btn">← Voltar</a>
</body>
</html>
