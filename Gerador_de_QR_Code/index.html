<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de QR Code</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <header>
            <h1>Gerador de QR Code</h1>
            <p>Cole uma URL ou escreva seu texto para criar seu QR Code</p>
        </header>
        <div class="form">
            <input type="text" spellcheck="false" placeholder="Escreva um texto ou cole uma URL">
            <button>Gerar QR Code</button>
        </div>
        <div class="qr-code">
            <img src="" alt="qr-code">
        </div>
    </div>
    <a href="javascript:history.back()" class="back-btn">← Voltar</a>
    
    <script src="script.js"></script>
</body>
</html>
